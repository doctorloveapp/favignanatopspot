name: favignana_top_spot
description: A tourist app for Favignana beaches.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Networking
  http: ^1.1.0
  # Maps
  url_launcher: ^6.2.0
  # Images
  cached_network_image: ^3.3.0
  # Localization
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
