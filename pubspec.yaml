name: favignana_top_spot
description: A tourist app for Favignana beaches.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Networking
  http: ^1.1.0
  # Maps
  url_launcher: ^6.2.0
  # Images
  cached_network_image: ^3.3.0
  # Localization
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/logo.png"
  windows:
    generate: true
    image_path: "assets/logo.png"
  macos:
    generate: true
    image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  
  # Assets dell'applicazione
  assets:
    - assets/
    - assets/spot/
